services:
  webhook:
    build: .
    container_name: docker-deploy-webhook
    command: ['node', 'dist/index.js', 'webhook']
    restart: unless-stopped
    ports:
      - '8080:8080'
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config:/app/config:ro
      - ./data:/app/data
      - ${STACKS_ROOT:-/opt/stacks}:/opt/stacks
    depends_on:
      redis:
        condition: service_healthy

  admin:
    build: .
    entrypoint: ['node', 'dist/index.js', 'admin']
    command: ['help']
    profiles: ['admin']
    restart: 'no'
    ports: []
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config:/app/config
      - ./data:/app/data
      - ${STACKS_ROOT:-/opt/stacks}:/opt/stacks
      - ./.env:/app/.env
    depends_on:
      redis:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    container_name: depctl-caddy
    restart: unless-stopped
    profiles: ['proxy']
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
      - '127.0.0.1:2019:2019'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - ./config/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - default
      - depctl-proxy

  redis:
    image: redis:7-alpine
    container_name: docker-deploy-webhook-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  depctl-proxy:
    external: true
    name: depctl-proxy
