services:
  webhook:
    build: .
    container_name: docker-deploy-webhook
    command: ['node', 'dist/index.js', 'webhook']
    restart: unless-stopped
    ports:
      - '8080:8080'
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config:/app/config:ro
      - ./data:/app/data
      - ${STACKS_ROOT:-/opt/stacks}:/opt/stacks
    depends_on:
      redis:
        condition: service_healthy

  admin:
    build: .
    entrypoint: ['node', 'dist/index.js', 'admin']
    command: ['help']
    profiles: ['admin']
    restart: 'no'
    ports: []
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config:/app/config
      - ./data:/app/data
      - ${STACKS_ROOT:-/opt/stacks}:/opt/stacks
      - ./.env:/app/.env
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: docker-deploy-webhook-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis_data:
